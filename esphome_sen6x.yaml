substitutions:
  id_prefix: sen6x_c3
  node_name: aqs-sen6x-c3
  name: "Air Quality System"

  my_latitude: "52.5200"
  my_longitude: "13.4050"

  pin_sda: 'GPIO06'
  pin_scl: 'GPIO07'
  pin_clk: 'GPIO08'
  pin_mosi: 'GPIO10'
  pin_reset: 'GPIO03'
  pin_cs: 'GPIO05'
  pin_dc: 'GPIO04'
  pin_backlight: 'GPIO02'

globals:
  - id: system_ready
    type: bool
    initial_value: 'false'

esphome:
  name: ${node_name}
  includes:
    - "<esp_wifi.h>"
  platformio_options:
    board_build.f_cpu: 80000000L
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: display_backlight
          brightness: 100% 
      - script.execute: apply_theme
      - wait_until: { time.has_time: }
      - script.execute: update_backlight    

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_80: "y"
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_160: "n"
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ: "80"

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_key

wifi:
  power_save_mode: LIGHT
  fast_connect: True
  output_power: 14dB
  networks:
  - ssid: !secret wifi_ssid
    password: !secret wifi_password
    
  ap: 
    password: !secret wifi_ap_password

captive_portal:

web_server:
  port: 80
  version: 3

#external_components:
#  - source:
#      type: git
#      url: https://github.com/tuct/esphome-projects
#      path: components
#      ref: main
#    components: [ sen6x ]

external_components:
  - source:
      type: local
      path: custom_components

binary_sensor:
  - platform: sen6x
    id: sen6x_status
    sen6x_id: sen54

  - platform: template
    name: "SEN66 Ready"
    id: sensor_functional
    lambda: |-
      if (std::isnan(id(my_co2).state)) return false;
      return true;

logger:
  level: INFO

debug: 

i2c:
  sda: ${pin_sda}
  scl: ${pin_scl}
  scan: true

spi:
  id: spi_bus
  clk_pin: ${pin_clk}
  mosi_pin: ${pin_mosi}

font:
  - file: "gfonts://Rubik@700"
    id: lv_font_large
    size: 48
    bpp: 4
  - file: "gfonts://Rubik@400"
    id: lv_font_small
    size: 15
    bpp: 4

display:
  - platform: ili9xxx
    id: my_display
    model: GC9A01A
    spi_id: spi_bus
    cs_pin: ${pin_cs}
    dc_pin: ${pin_dc}
    reset_pin: ${pin_reset}
    data_rate: 80MHz
    spi_mode: mode3
    dimensions: { height: 240, width: 240 }
    invert_colors: true

lvgl:
  displays: my_display
  buffer_size: 20%
  color_depth: 16
  bg_color: 0x000000
  update_interval: 1s
  widgets:
    - label: { id: label_main, text: "---", align: CENTER, y: -40, text_font: lv_font_large }
    - label: { id: label_row1, text: "--- | ---", align: CENTER, y: -5, text_font: lv_font_small }
    - label: { id: label_row2, text: "--- | ---", align: CENTER, y: 20, text_font: lv_font_small }
    - label: { id: label_row3, text: "--- | ---", align: CENTER, y: 45, text_font: lv_font_small }
    
    - label: 
        id: label_wifi
        text: "WiFi"
        align: BOTTOM_MID
        y: -10
        text_font: lv_font_small
    
    - arc: { id: arc_outer, width: 240, height: 240, align: CENTER, start_angle: 135, end_angle: 45, arc_width: 10 }
    - arc: { id: arc_middle, width: 212, height: 212, align: CENTER, start_angle: 135, end_angle: 45, arc_width: 10 }
    - arc: { id: arc_inner, width: 184, height: 184, align: CENTER, start_angle: 135, end_angle: 45, arc_width: 10 }

interval:
  # --- 1. SENSOR UPDATE ENGINE ---
  - interval: 1s
    id: interval_sensor_update
    then:
      - if:
          condition:
            lambda: |-
              static uint32_t last_sensor_update = 0;
              uint32_t now = millis();
              float s = id(sensor_update_slider).state;
              if (std::isnan(s) || s < 5) s = 30.0; 
              if (now - last_sensor_update >= (uint32_t)(s * 1000)) {
                last_sensor_update = now;
                return true; 
              }
              return false;
          then:
           - component.update: sen54

  # --- 2. DISPLAY UPDATE ENGINE & BACKLIGHT ---
  - interval: 1s
    id: interval_display_update
    then:
      - lambda: |-
          // ================= BACKLIGHT =================
          float target_bright = 100.0;
          if (!id(sntp_time).now().is_valid()) {
             target_bright = id(brightness_day).state;
          } else {
             target_bright = id(sun_id).is_above_horizon() ? id(brightness_day).state : id(brightness_night).state;
          }
          
          static float last_bright = -1.0;
          if (!std::isnan(target_bright) && target_bright != last_bright) {
             id(backlight_pwm).set_level(target_bright / 100.0);
             last_bright = target_bright;
          }

          // ================= DISPLAY TIMER =================
          static uint32_t last_display_update = 0;
          uint32_t now = millis();
          float d = id(display_update_slider).state;
          if (std::isnan(d) || d < 1) d = 5.0;
          
          if (now - last_display_update < (uint32_t)(d * 1000)) return;
          last_display_update = now; 

          if (!id(my_display).is_ready()) return;

          // ================= SMART FARBEN CACHING (LIVE-EDITING) =================
          static std::string l_cg, l_c1, l_c2, l_c3, l_icl, l_icd, l_txl, l_txd;
          static lv_color_t c_good, c_lim1, c_lim2, c_lim3, arc_ic_light, arc_ic_dark, tx_light, tx_dark;
          static size_t l_theme = 99;
          bool style_changed = false;

          // Funktion prüft: Hat sich der String in HA geändert? Nur dann neu berechnen!
          auto chk_col = [&](text::Text *obj, std::string &last_val, lv_color_t &c) {
            if (obj->state != last_val) {
              c = lv_color_hex(strtol(obj->state.c_str(), NULL, 16));
              last_val = obj->state;
              style_changed = true; // Signal: Display muss neu gemalt werden!
            }
          };

          chk_col(id(color_good), l_cg, c_good);
          chk_col(id(color_lim1), l_c1, c_lim1);
          chk_col(id(color_lim2), l_c2, c_lim2);
          chk_col(id(color_lim3), l_c3, c_lim3);
          chk_col(id(color_ic_light), l_icl, arc_ic_light);
          chk_col(id(color_ic_dark), l_icd, arc_ic_dark);
          chk_col(id(color_tx_light), l_txl, tx_light);
          chk_col(id(color_tx_dark), l_txd, tx_dark);

          // Theme Dropdown prüfen
          size_t cur_theme = id(theme_select).active_index().value_or(0);
          if (cur_theme != l_theme) {
            style_changed = true;
            l_theme = cur_theme;
          }

          // ================= STATIC BUFFERS & CACHES =================
          static char buf_main[32] = "", buf_r1[64] = "", buf_r2[64] = "", buf_r3[64] = "", buf_wifi[32] = "";
          static float last_v_out = NAN, last_v_mid = NAN, last_v_in = NAN;
          static uint16_t last_c_out = 0, last_c_mid = 0, last_c_in = 0, last_c_main = 0;

          // Wenn du in HA eine Farbe änderst, löschen wir das Farb-Gedächtnis.
          // Das zwingt LVGL dazu, die neuen Farben sofort anzuwenden!
          if (style_changed) {
            last_c_out = 0xFFFF;
            last_c_mid = 0xFFFF;
            last_c_in  = 0xFFFF;
            last_c_main = 0xFFFF;
          }

          // ================= THEME ZUWEISUNG =================
          bool is_l = (cur_theme == 1);
          lv_color_t arc_inact = is_l ? arc_ic_light : arc_ic_dark;
          lv_color_t tx_main = is_l ? tx_light : tx_dark;

          // ================= INDEX (ENUM) HELPERS =================
          auto get_val = [&](size_t idx) -> float {
            switch(idx) {
              case 1: return id(my_co2).state;
              case 2: return id(my_pm1).state;
              case 3: return id(my_pm25).state;
              case 4: return id(my_pm4).state;
              case 5: return id(my_pm10).state;
              case 6: return id(my_voc).state;
              case 7: return id(my_nox).state;
              case 8: return id(my_temp).state;
              case 9: return id(my_hum).state;
              default: return NAN;
            }
          };

          auto get_col = [&](size_t idx, float v) -> lv_color_t {
            if (std::isnan(v)) return lv_color_hex(0x555555);
            switch(idx) {
              case 1: if (v >= id(lim_co2_3).state) return c_lim3; if (v >= id(lim_co2_2).state) return c_lim2; if (v >= id(lim_co2_1).state) return c_lim1; break;
              case 2: if (v >= id(lim_pm1_3).state) return c_lim3; if (v >= id(lim_pm1_2).state) return c_lim2; if (v >= id(lim_pm1_1).state) return c_lim1; break;
              case 3: if (v >= id(lim_pm25_3).state) return c_lim3; if (v >= id(lim_pm25_2).state) return c_lim2; if (v >= id(lim_pm25_1).state) return c_lim1; break;
              case 4: if (v >= id(lim_pm4_3).state) return c_lim3; if (v >= id(lim_pm4_2).state) return c_lim2; if (v >= id(lim_pm4_1).state) return c_lim1; break;
              case 5: if (v >= id(lim_pm10_3).state) return c_lim3; if (v >= id(lim_pm10_2).state) return c_lim2; if (v >= id(lim_pm10_1).state) return c_lim1; break;
              case 6: if (v >= id(lim_voc_3).state) return c_lim3; if (v >= id(lim_voc_2).state) return c_lim2; if (v >= id(lim_voc_1).state) return c_lim1; break;
              case 7: if (v >= id(lim_nox_3).state) return c_lim3; if (v >= id(lim_nox_2).state) return c_lim2; if (v >= id(lim_nox_1).state) return c_lim1; break;
            }
            return c_good;
          };

          auto fmt_val = [&](char* buf, size_t size, size_t idx, float v, bool is_slot) {
            if (idx == 0 || std::isnan(v)) { snprintf(buf, size, "---"); return; }
            if (is_slot) {
              switch(idx) {
                case 1: snprintf(buf, size, "CO2:%.0f", v); break;
                case 2: snprintf(buf, size, "PM1:%.0f", v); break;
                case 3: snprintf(buf, size, "PM2.5:%.0f", v); break;
                case 4: snprintf(buf, size, "PM4:%.0f", v); break;
                case 5: snprintf(buf, size, "PM10:%.0f", v); break;
                case 6: snprintf(buf, size, "V:%.0f", v); break;
                case 7: snprintf(buf, size, "N:%.0f", v); break;
                case 8: snprintf(buf, size, "%.1f°C", v); break;
                case 9: snprintf(buf, size, "%.0f%%", v); break;
              }
            } else {
              if (idx == 8) snprintf(buf, size, "%.1f", v);
              else snprintf(buf, size, "%.0f", v);
            }
          };

          // ================= ARCS =================
          auto upd_arc = [&](lv_obj_t* arc, size_t idx, float min_v, float max_v, float &last_v, uint16_t &last_c) {
            if (lv_arc_get_min_value(arc) != min_v || lv_arc_get_max_value(arc) != max_v) {
                lv_arc_set_range(arc, min_v, max_v);
            }
            
            float v = get_val(idx);
            if (v != last_v || (std::isnan(v) && !std::isnan(last_v))) {
              lv_arc_set_value(arc, std::isnan(v) ? min_v : v); 
              last_v = v;
            }
            
            lv_color_t target_col = (idx == 0 || std::isnan(v)) ? arc_inact : get_col(idx, v);
            if (target_col.full != last_c) {
              lv_obj_set_style_arc_color(arc, target_col, LV_PART_INDICATOR);
              last_c = target_col.full;
            }
          };

          upd_arc(id(arc_outer), id(sel_arc_out).active_index().value_or(0), id(num_arc_out_min).state, id(num_arc_out_max).state, last_v_out, last_c_out);
          upd_arc(id(arc_middle), id(sel_arc_mid).active_index().value_or(0), id(num_arc_mid_min).state, id(num_arc_mid_max).state, last_v_mid, last_c_mid);
          upd_arc(id(arc_inner), id(sel_arc_in).active_index().value_or(0), id(num_arc_in_min).state, id(num_arc_in_max).state, last_v_in, last_c_in);

          // ================= MAIN VALUE =================
          size_t m_idx = id(sel_main).active_index().value_or(0);
          float m_v = get_val(m_idx);
          
          char tmp_main[32];
          fmt_val(tmp_main, sizeof(tmp_main), m_idx, m_v, false);
          
          if (strcmp(tmp_main, buf_main) != 0) {
            strcpy(buf_main, tmp_main);
            lv_label_set_text_static(id(label_main), buf_main);
          }
          
          lv_color_t main_col = (m_idx == 0 || std::isnan(m_v)) ? tx_main : get_col(m_idx, m_v);
          if (main_col.full != last_c_main) {
            lv_obj_set_style_text_color(id(label_main), main_col, LV_PART_MAIN);
            last_c_main = main_col.full;
          }

          // ================= SLOTS =================
          char t1[32], t2[32], r_final[64];

          fmt_val(t1, sizeof(t1), id(sel_s1).active_index().value_or(0), get_val(id(sel_s1).active_index().value_or(0)), true);
          fmt_val(t2, sizeof(t2), id(sel_s2).active_index().value_or(0), get_val(id(sel_s2).active_index().value_or(0)), true);
          snprintf(r_final, sizeof(r_final), "%s | %s", t1, t2);
          if (strcmp(r_final, "--- | ---") == 0) strcpy(r_final, "");
          if (strcmp(r_final, buf_r1) != 0) { strcpy(buf_r1, r_final); lv_label_set_text_static(id(label_row1), buf_r1); }

          fmt_val(t1, sizeof(t1), id(sel_s3).active_index().value_or(0), get_val(id(sel_s3).active_index().value_or(0)), true);
          fmt_val(t2, sizeof(t2), id(sel_s4).active_index().value_or(0), get_val(id(sel_s4).active_index().value_or(0)), true);
          snprintf(r_final, sizeof(r_final), "%s | %s", t1, t2);
          if (strcmp(r_final, "--- | ---") == 0) strcpy(r_final, "");
          if (strcmp(r_final, buf_r2) != 0) { strcpy(buf_r2, r_final); lv_label_set_text_static(id(label_row2), buf_r2); }

          fmt_val(t1, sizeof(t1), id(sel_s5).active_index().value_or(0), get_val(id(sel_s5).active_index().value_or(0)), true);
          fmt_val(t2, sizeof(t2), id(sel_s6).active_index().value_or(0), get_val(id(sel_s6).active_index().value_or(0)), true);
          snprintf(r_final, sizeof(r_final), "%s | %s", t1, t2);
          if (strcmp(r_final, "--- | ---") == 0) strcpy(r_final, "");
          if (strcmp(r_final, buf_r3) != 0) { strcpy(buf_r3, r_final); lv_label_set_text_static(id(label_row3), buf_r3); }

          // ================= WIFI =================
          if (id(wifi_signal_percent).has_state()) {
            snprintf(r_final, sizeof(r_final), "WiFi: %.0f%%", id(wifi_signal_percent).state);
          } else {
            snprintf(r_final, sizeof(r_final), "WiFi: ---");
          }
          if (strcmp(r_final, buf_wifi) != 0) {
            strcpy(buf_wifi, r_final);
            lv_label_set_text_static(id(label_wifi), buf_wifi);
          }
          
  - interval: 60s
    id: interval_sun_check
    then:
        - script.execute: update_backlight

script:

  - id: update_backlight
    then:
      - lambda: |-
          float target_bright = 100.0;
          if (!id(sntp_time).now().is_valid()) {
             target_bright = id(brightness_day).state;
          } else {
             target_bright = id(sun_id).is_above_horizon() ? id(brightness_day).state : id(brightness_night).state;
          }
          id(backlight_pwm).set_level(target_bright / 100.0);

  - id: apply_theme
    then:
      - lambda: |-
          bool is_l = (id(theme_select).active_index().value_or(0) == 1);
          lv_color_t bg = is_l ? lv_color_hex(strtol(id(color_bg_light).state.c_str(), NULL, 16)) : lv_color_hex(strtol(id(color_bg_dark).state.c_str(), NULL, 16));
          lv_color_t tx = is_l ? lv_color_hex(strtol(id(color_tx_light).state.c_str(), NULL, 16)) : lv_color_hex(strtol(id(color_tx_dark).state.c_str(), NULL, 16));
          lv_obj_set_style_bg_color(lv_scr_act(), bg, LV_PART_MAIN);

          auto s_l = [&](lv_obj_t* o, lv_color_t c) {
              lv_obj_set_style_text_color(o, c, LV_PART_MAIN);
              lv_obj_set_style_bg_color(o, bg, LV_PART_MAIN);
              lv_obj_set_style_bg_opa(o, LV_OPA_COVER, LV_PART_MAIN);
          };

          s_l(id(label_row1), tx); s_l(id(label_row2), tx); s_l(id(label_row3), tx);
          s_l(id(label_main), tx);
          s_l(id(label_wifi), tx);
          lv_obj_set_style_arc_color(id(arc_outer), bg, LV_PART_MAIN);
          lv_obj_set_style_arc_color(id(arc_middle), bg, LV_PART_MAIN);
          lv_obj_set_style_arc_color(id(arc_inner), bg, LV_PART_MAIN);

sensor:
  - platform: sen6x
    id: sen54
    update_interval: 24h
    co2: { id: my_co2, name: "CO2" }
    pm_1_0: { id: my_pm1, name: "PM 1.0" }
    pm_2_5: { id: my_pm25, name: "PM 2.5" }
    pm_4_0: { id: my_pm4, name: "PM 4.0" }
    pm_10_0: { id: my_pm10, name: "PM 10" }
    voc: { id: my_voc, name: "VOC Index" }
    nox: { id: my_nox, name: "NOx Index" }
    temperature: { id: raw_temp, internal: true }
    humidity: { id: raw_hum, internal: true }

  - platform: template
    name: "Temperature"
    id: my_temp
    unit_of_measurement: "°C"
    lambda: "return id(raw_temp).state + id(offset_temp).state;"
  
  - platform: template
    name: "Humidity"
    id: my_hum
    unit_of_measurement: "%"
    lambda: |-
      float t_r = id(raw_temp).state;
      float t_c = t_r + id(offset_temp).state;
      float rh = id(raw_hum).state * exp(17.62 * ((t_r / (243.12 + t_r)) - (t_c / (243.12 + t_c))));
      return clamp(rh + id(offset_hum).state, 0.0f, 100.0f);

  - platform: wifi_signal
    update_interval: 60s
    id: wifi_signal_db
    name: "WiFi Signal dBm"
    unit_of_measurement: "dBm"
    entity_category: diagnostic
    on_value_range:
      - below: -85.0
        then:
          - logger.log: "WiFi signal weak! Restarting to find a better network."
          - delay: 2s
          - button.press: esphome_reboot_button
  
  - platform: uptime
    update_interval: 60s
    name: "Uptime"
    
  - platform: copy
    source_id: wifi_signal_db
    id: wifi_signal_percent
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    
  - platform: template
    name: "Heap Free Memory"
    id: heap_free
    unit_of_measurement: "B"
    update_interval: 60s
    lambda: |-
      return (float) esp_get_free_heap_size();
    
  - platform: template
    name: "Heap Largest Free Block"
    update_interval: 60s
    lambda: |-
      return (float) heap_caps_get_largest_free_block(MALLOC_CAP_DEFAULT);

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"

# --- DIE RETTUNG VOR DER 60-SEKUNDEN FLUT (update_interval: never) ---
text:
  - platform: template
    name: "Color: Good"
    id: color_good
    mode: text
    entity_category: config
    initial_value: "00D100" 
    optimistic: true
    restore_value: true
    update_interval: never

  - platform: template
    name: "Color: Level 1"
    id: color_lim1
    mode: text
    entity_category: config
    initial_value: "FFA500" 
    optimistic: true
    restore_value: true
    update_interval: never

  - platform: template
    name: "Color: Level 2"
    id: color_lim2
    mode: text
    entity_category: config
    initial_value: "FF4500" 
    optimistic: true
    restore_value: true
    update_interval: never

  - platform: template
    name: "Color: Level 3"
    id: color_lim3
    mode: text
    entity_category: config
    initial_value: "FF0000" 
    optimistic: true
    restore_value: true
    update_interval: never

  - platform: template
    name: "Theme Dark: Background"
    id: color_bg_dark
    mode: text
    entity_category: config
    initial_value: "000000"
    optimistic: true
    restore_value: true
    update_interval: never

  - platform: template
    name: "Theme Dark: Text"
    id: color_tx_dark
    mode: text
    entity_category: config
    initial_value: "FFFFFF"
    optimistic: true
    restore_value: true
    update_interval: never

  - platform: template
    name: "Theme Dark: Arc Inactive"
    id: color_ic_dark
    mode: text
    entity_category: config
    initial_value: "333333"
    optimistic: true
    restore_value: true
    update_interval: never

  - platform: template
    name: "Theme Light: Background"
    id: color_bg_light
    mode: text
    entity_category: config
    initial_value: "FFFFFF"
    optimistic: true
    restore_value: true
    update_interval: never

  - platform: template
    name: "Theme Light: Text"
    id: color_tx_light
    mode: text
    entity_category: config
    initial_value: "000000"
    optimistic: true
    restore_value: true
    update_interval: never

  - platform: template
    name: "Theme Light: Arc Inactive"
    id: color_ic_light
    mode: text
    entity_category: config
    initial_value: "CCCCCC"
    optimistic: true
    restore_value: true
    update_interval: never

button:
  - platform: restart
    id: esphome_reboot_button
    icon: mdi:power-cycle
    name: System Reboot
    entity_category: diagnostic

select:
  - platform: template
    name: "Display Theme"
    id: theme_select
